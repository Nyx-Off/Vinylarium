name: ✨ Demande de fonctionnalité
description: Proposer une amélioration ou une nouvelle fonctionnalité
title: "[Idée] : "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Merci pour votre idée ! Jetez un œil à la **feuille de route** du README
        et aux issues existantes au cas où elle serait déjà prévue.
  - type: textarea
    id: problem
    attributes:
      label: Quel problème cela résout-il ?
      description: "Par exemple : « Je suis gêné quand … »"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Solution proposée
      description: Décrivez la fonctionnalité ou le comportement souhaité.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives envisagées
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Contexte additionnel
      description: Maquettes, captures, exemples d'autres apps…
    validations:
      required: false
