server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip for assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Build assets are content-hashed (index-ABC123.js) — safe to cache forever.
    # A missing asset 404s instead of falling back to index.html (which would
    # serve HTML with a .js MIME type and break the page).
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA shell: serve index.html for any route, and always revalidate it so a
    # freshly deployed build is picked up without a manual cache clear.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # API -> backend service
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Allow large Discogs CSV exports & cover uploads
        client_max_body_size 64m;
        proxy_read_timeout 300s;
    }

    # Uploaded media (covers, avatars) streamed by the backend
    location /media/ {
        proxy_pass http://backend:3000/media/;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }
}
